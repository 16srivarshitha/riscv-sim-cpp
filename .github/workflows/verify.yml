name: RISC-V Sim Verification
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf
      
      - name: Build Test Program
        run: |
          cd tests
          riscv64-unknown-elf-as -march=rv32i -mabi=ilp32 -o test_program.o test_program.s
          riscv64-unknown-elf-ld -m elf32lriscv -Ttext=0x0 -o test_program.elf test_program.o
          riscv64-unknown-elf-objcopy -O binary test_program.elf test_program.bin
          cd ..
      
      - name: Configure CMake
        run: cmake -B build -S .
      
      - name: Build Project
        run: cmake --build build
      
      - name: Run Basic Test
        run: ./build/riscv-sim -d tests/test_program.bin
