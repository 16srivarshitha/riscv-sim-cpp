name: RISC-V Sim Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build Project
        run: cmake --build build

      - name: Run Basic Test
        run: ./build/riscv-sim -d tests/test_program.bin
